<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realtimeotom3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100dvh; 
            overflow: hidden;
            background-color: #ffffff; 
            font-family: monospace;
        }

        /* 픽셀 폰트 적용할 클래스 */
        .pixel-font {
            font-family: 'NeoDunggeunmo', monospace;
            -webkit-font-smoothing: none; /* 글씨 뭉개짐 방지 (찐 픽셀 느낌) */
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 35px;
            background: #dfdfdf;
            border-bottom: 2px solid #808080; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            user-select: none;
        }
        
        /* 좌측 상단 메뉴 버튼들 묶음 */
        .top-menu {
            display: flex;
            gap: 4px;
        }

        /* 메뉴 버튼 양각 효과 */
        .menu-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 16px;
            color: #000;
        }

        /* 메뉴 버튼 눌렸을 때 (음각) + 현재 눌려있는 active 상태 */
        .menu-btn:active, .menu-btn.active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 7px 1px 9px; 
            background: #d4d4d4; 
        }

        .menu-bar {
            height: 30px;
            background: #dfdfdf;
            border-top: 2px solid #ffffff; 
            border-bottom: 3px solid #808080;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .close-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            font-family: sans-serif;
        }
        .close-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 9px 1px 11px;
        }

        .content-area {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .left-image-zone {
            flex: 1;
            height: 100%;
        }

        .right-menu-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            min-width: 250px;
        }

        .os-btn {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.1s;
        }
        .os-btn:hover {
            transform: scale(1.1);
            text-shadow: 2px 2px 0px #ccc;
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        
        .start-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 4px 20px;
            height: 30px;
            cursor: pointer;
        }
        .start-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
        }

        /* 시계 폰트 크기 살짝 조정 */
        #clock {
            font-size: 16px;
            user-select: none;
        }

        @media screen and (max-width: 768px) {
            .content-area { flex-direction: column; padding: 20px; }
            .left-image-zone { height: 40%; width: 100%; }
            .right-menu-zone { width: 100%; align-items: center; }
            .os-btn { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        
        <header class="top-bar">
            <div class="top-menu">
                <button class="menu-btn active pixel-font">main</button>
                <button class="menu-btn pixel-font">file</button>
                <button class="menu-btn pixel-font">favorites</button>
                <button class="menu-btn pixel-font">help!</button>
                <button class="menu-btn pixel-font">lucky?</button>
            </div>
            <div class="close-btn">X</div>
        </header>
        
        <div class="menu-bar"></div>

        <main class="content-area">
            <div class="left-image-zone"></div>
            <div class="right-menu-zone">
                <a href="start.html" class="os-btn">START!</a>
            </div>
        </main>

        <footer class="bottom-bar">
            <div class="start-btn"></div>
            <div id="clock" class="pixel-font">00/00/0000 00:00 PM</div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 미국식 날짜 세팅 (MM/DD/YYYY)
            let month = now.getMonth() + 1;
            let date = now.getDate();
            let year = now.getFullYear();
            
            // 1자리 수면 앞에 0 붙여줌
            month = month < 10 ? '0' + month : month;
            date = date < 10 ? '0' + date : date;
            const dateStr = month + '/' + date + '/' + year;

            // 시간 세팅
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeStr = hours + ':' + minutes + ' ' + ampm;

            // 합쳐서 화면에 뿌림
            document.getElementById('clock').innerHTML = dateStr + ' ' + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
