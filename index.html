<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realtimeotom3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100dvh; 
            overflow: hidden;
            background-color: #ffffff; 
            font-family: monospace;
        }

        .pixel-font {
            font-family: 'NeoDunggeunmo', monospace;
            -webkit-font-smoothing: none; 
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 첫 번째 상단바 (제목 표시줄) */
        .top-bar {
            height: 35px;
            background: #dfdfdf;
            border-bottom: 2px solid #808080; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            user-select: none;
        }
        
        .top-menu {
            display: flex;
            gap: 4px;
        }

        .menu-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 16px;
            color: #000;
        }

        .menu-btn:active, .menu-btn.active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 7px 1px 9px; 
            background: #d4d4d4; 
        }

        .close-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            font-family: sans-serif;
        }
        .close-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 9px 1px 11px;
        }

        /* 두 번째 상단바 (주소창 줄) */
        .menu-bar {
            height: 34px; 
            background: #dfdfdf;
            border-top: 2px solid #ffffff; 
            border-bottom: 3px solid #808080;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px; 
        }

        .address-label {
            font-size: 16px;
            color: #000;
        }

        .address-field {
            flex-grow: 1; 
            height: 22px;
            background: #fff;
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 0 8px;
            color: #000;
            font-size: 14px;
            outline: none; 
        }

        .address-dropdown-btn {
            width: 22px;
            height: 22px;
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            color: #000;
        }

        .address-dropdown-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 1px 0 0 1px; 
        }

        .content-area {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .left-image-zone {
            flex: 1;
            height: 100%;
        }

        .right-menu-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            min-width: 250px;
            margin-right: 130px; /* 👇 좀 더 왼쪽으로 확 밀었음 */
        }

        /* START 버튼 폰트 스타일링 */
        .os-btn {
            font-family: 'NeoDunggeunmo', monospace;
            font-size: 46px; /* 👇 1.2배 뻥튀기함 */
            font-weight: normal; 
            font-style: italic; 
            letter-spacing: 2px; 
            color: #000;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.1s;
            -webkit-font-smoothing: none;
        }
        
        .os-btn:hover {
            transform: scale(1.1);
            text-shadow: 2px 2px 0px #ccc;
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        
        .start-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 4px 20px;
            height: 30px;
            cursor: pointer;
        }
        .start-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
        }

        #clock {
            font-size: 16px;
            user-select: none;
        }

        /* 폰 세로 모드 대응 */
        @media screen and (max-width: 768px) {
            .content-area { flex-direction: column; padding: 20px; }
            .left-image-zone { height: 40%; width: 100%; }
            .right-menu-zone { 
                width: 100%; 
                align-items: center; 
                margin-right: 0; 
            }
            .os-btn { font-size: 34px; } /* 👇 모바일 크기도 1.2배 키움 */
            
            .address-label { display: none; }
            .address-field { border-right: none; } 
            .address-dropdown-btn { border-left: none; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        
        <header class="top-bar">
            <div class="top-menu">
    <button class="menu-btn active pixel-font">main</button>
    <button class="menu-btn pixel-font">file</button>
    <button class="menu-btn pixel-font">favorites</button>
    <button class="menu-btn pixel-font">help!</button>
    <button class="menu-btn pixel-font">lucky?</button>

    <button class="menu-btn pixel-font" onclick="openChatStudio()">
        chat♡
    </button>
</div>
        </header>
        
        <div class="menu-bar">
            <div class="address-label pixel-font">Address</div>
            <input type="text" class="address-field pixel-font" placeholder="">
            <div class="address-dropdown-btn pixel-font">▼</div>
        </div>

        <main class="content-area">
            <div class="left-image-zone"></div>
            <div class="right-menu-zone">
                <a href="start.html" class="os-btn">START!</a>
            </div>
        </main>

        <footer class="bottom-bar">
            <div class="start-btn"></div>
            <div id="clock" class="pixel-font">00/00/0000 00:00 PM</div>
        </footer>
    </div>

    <script>
    function updateClock() {
        const now = new Date();

        let month = now.getMonth() + 1;
        let date = now.getDate();
        let year = now.getFullYear();

        month = month < 10 ? '0' + month : month;
        date = date < 10 ? '0' + date : date;
        const dateStr = month + '/' + date + '/' + year;

        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        const timeStr = hours + ':' + minutes + ' ' + ampm;

        document.getElementById('clock').innerHTML = dateStr + ' ' + timeStr;
    }

    setInterval(updateClock, 1000);
    updateClock();

    function openChatStudio() {
        window.location.href = "ai/";
    }
</script>
    </script>
</body>
</html>
