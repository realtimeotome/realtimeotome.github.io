<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY_PROJECT_ARCHIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff; 
            font-family: monospace;
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 40px;
            background: #dfdfdf;
            border-bottom: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            user-select: none;
        }
        /* 메인 창 제목 폰트 굵게 */
        .win-title { font-weight: bold; }

        .content-area {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* 나중에 메인 이미지 들어갈 왼쪽 구역 */
        .left-image-zone {
            flex: 1;
            height: 100%;
            /* 텍스트 테스트용 (나중에 지워도 됨) */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }

        .right-menu-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            min-width: 250px;
        }

        .os-btn {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.1s;
        }
        .os-btn:hover {
            transform: scale(1.1);
            text-shadow: 2px 2px 0px #ccc;
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        .start-btn {
            background: #ccc;
            border: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 4px 12px;
            font-weight: bold;
        }

        @media screen and (max-width: 768px) {
            .content-area { flex-direction: column; padding: 20px; }
            .left-image-zone { height: 40%; width: 100%; }
            .right-menu-zone { width: 100%; align-items: center; }
            .os-btn { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        <header class="top-bar">
            <div class="win-title">💾 MY_PROJECT_ARCHIVE.exe</div>
            <div class="win-title">X</div>
        </header>

        <main class="content-area">
            <div class="left-image-zone">
                [ MAIN IMAGE OR TEXT ]
            </div>

            <div class="right-menu-zone">
                <a href="start.html" class="os-btn">START!</a>
                <a href="sentinel_logs.html" class="os-btn">센티넬 설정집</a>
                <a href="char_prompts.html" class="os-btn">프롬프트 태그 (병지/송곳니)</a>
                <a href="saju_notes.html" class="os-btn">진술축미 분석 메모</a>
                <a href="#" class="os-btn">SAVE FILE?</a>
            </div>
        </main>

        <footer class="bottom-bar">
            <div class="start-btn">START</div>
            <div id="clock">00:00 PM</div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            document.getElementById('clock').innerHTML = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
