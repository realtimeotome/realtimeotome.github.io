<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY_PROJECT_ARCHIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff; 
            font-family: monospace;
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단바 첫 번째 줄 (타이틀 바) */
        .top-bar {
            height: 35px;
            background: #dfdfdf;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            user-select: none;
        }
        
        /* 2. 상단바 두 번째 줄 (메뉴 바) */
        .menu-bar {
            height: 30px;
            background: #dfdfdf;
            border-bottom: 3px solid #999;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        /* 우측 상단 X 버튼 (양각/음각 효과) */
        .close-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        /* X 버튼 눌렀을 때 쏙 들어가는 효과 */
        .close-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 9px 1px 11px; /* 글자 위치도 같이 눌리게 이동 */
        }

        .content-area {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* 왼쪽 이미지/텍스트 구역 */
        .left-image-zone {
            flex: 1;
            height: 100%;
        }

        .right-menu-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            min-width: 250px;
        }

        .os-btn {
            font-size: 32px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.1s;
        }
        .os-btn:hover {
            transform: scale(1.1);
            text-shadow: 2px 2px 0px #ccc;
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }
        
        /* 맨 아래 빈 버튼 (양각/음각 효과) */
        .start-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 4px 20px; /* 글씨가 없어도 버튼 모양 유지되게 여백 줌 */
            height: 30px;
            cursor: pointer;
        }
        /* 버튼 눌렀을 때 쏙 들어가는 효과 */
        .start-btn:active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
        }

        @media screen and (max-width: 768px) {
            .content-area { flex-direction: column; padding: 20px; }
            .left-image-zone { height: 40%; width: 100%; }
            .right-menu-zone { width: 100%; align-items: center; }
            .os-btn { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        
        <!-- 1. 첫 번째 상단바 (글씨 다 지우고 X버튼만 남김) -->
        <header class="top-bar">
            <div></div> <!-- 빈 공간 -->
            <div class="close-btn">X</div>
        </header>
        
        <!-- 2. 두 번째 상단바 (두 줄 요청) -->
        <div class="menu-bar"></div>

        <main class="content-area">
            
            <!-- 왼쪽 구역 (가운데 글씨 지움) -->
            <div class="left-image-zone"></div>

            <div class="right-menu-zone">
                <!-- 요청한 대로 START! 만 남김 -->
                <a href="start.html" class="os-btn">START!</a>
            </div>
            
        </main>

        <footer class="bottom-bar">
            <!-- 하단 좌측 버튼 (글씨 지우고 입체 효과만 줌) -->
            <div class="start-btn"></div>
            <div id="clock">00:00 PM</div>
        </footer>
    </div>

    <!-- 시계 돌아가는 스크립트 -->
    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            document.getElementById('clock').innerHTML = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
