<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <button class="menu-btn" id="menuBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="title-bar-text">AI Studio v2.0</div>
            </div>
            <div class="title-bar-controls">
                <button class="icon-btn" style="font-size: 0.8rem;">x</button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            <div class="sidebar" id="sidebar">
                <ul class="tree-view">
                    <li class="active">👥 My Characters</li>
                    <li>💬 Recent Chats</li>
                    <li>🌍 World Settings</li>
                    <li>⚙️ System Settings</li>
                </ul>
            </div>
            
            <div class="main-content">
                <h2 class="main-title" id="mainTitle">My Characters</h2>
                <div class="card-grid" id="mainGrid">
                    <!-- 자바스크립트가 여기에 카드들을 그려줌 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ✨ [새로 추가됨] 세계관 설정 팝업창 (Modal) -->
    <div class="modal-overlay" id="worldModalOverlay">
        <div class="modal-window">
            <div class="modal-header">
                <h3 id="worldModalTitle">🌍 세계관 편집</h3>
                <button class="icon-btn" id="closeWorldModalBtn" style="font-weight: bold;">✕</button>
            </div>
            <div class="modal-body">
                <label style="font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; display: block;">세계관 이름</label>
                <input type="text" id="worldNameInput" class="glass-select" style="margin-bottom: 15px;" placeholder="예: 사이버펑크 네오서울">
                
                <label style="font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; display: block;">세계관 설정 (Lorebook)</label>
                <textarea id="worldContentInput" class="modal-textarea" placeholder="이 세계의 규칙, 고유명사, 배경 등을 자세히 적어주세요..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="cancelWorldModalBtn" style="margin-right: 10px;">취소</button>
                <button class="btn btn-save" id="saveWorldModalBtn">저장하기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
