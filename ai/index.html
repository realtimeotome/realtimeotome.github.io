<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Character Select</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">AI Studio v2.0</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="window.location.href='../index.html'">X</button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="sidebar">
                <ul class="tree-view">
                    <li class="active">👥 My Characters</li>
                    <li>💬 Recent Chats</li>
                    <li>🌍 World Settings</li>
                    <li>⚙️ System Settings</li>
                </ul>
            </div>

            <div class="main-content">
                <h2 class="main-title">My Characters</h2>
                <div class="card-grid">
                    
                    <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>Character 1</h3>
                        </div>
                    </div>

                    <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>Character 2</h3>
                        </div>
                    </div>

                     <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>Character 3</h3>
                        </div>
                    </div>

                    <div class="character-card add-new">
                        <div class="char-info">
                            <h3>+ New Character</h3>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
