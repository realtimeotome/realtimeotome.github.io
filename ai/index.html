<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Character Select</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'NeoDunggeunmo', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 가로로 쫙 넓어진 와이드 창 */
        .window {
            width: 96vw; /* 화면 꽉 차게 넓힘 */
            max-width: 1500px; /* 최대 크기도 대폭 증가 */
            height: 94vh;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title-bar {
            background: rgba(255, 255, 255, 0.4);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #333;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .title-bar-controls button {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-family: 'NeoDunggeunmo', monospace;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .title-bar-controls button:hover {
            background: #ff5f56;
            color: white;
            border-color: #ff5f56;
        }

        .window-body {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 25px; /* 사이드바와 메인 사이 여백 늘림 */
            overflow: hidden;
        }

        /* 왼쪽 사이드바 (조금 더 넓고 여유롭게) */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 20px 15px;
            overflow-y: auto;
        }

        .tree-view {
            list-style: none;
        }

        .tree-view li {
            padding: 14px 12px;
            cursor: pointer;
            font-size: 1.15rem;
            margin-bottom: 8px;
            border-radius: 8px;
            color: #444;
            transition: all 0.2s ease;
        }

        .tree-view li:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .tree-view li.active {
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 오른쪽 캐릭터 카드 영역 */
        .main-content {
            flex: 1;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 30px;
            overflow-y: auto;
        }

        .main-title {
            font-size: 1.8rem;
            color: #222;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.6);
        }

        /* 카드 그리드: 여러 장이 촘촘하게 배열되도록 설정 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* 카드가 작아지고 개수가 많아짐 */
            gap: 20px;
        }

        /* 캐릭터 카드: 세로로 긴 포트레이트 형태 */
        .character-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.8);
        }

        /* 일러스트 들어갈 자리 (세로 비율 확보) */
        .char-img-placeholder {
            width: 100%;
            height: 240px; /* 세로로 길게 설정 */
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            color: #888;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed rgba(0, 0, 0, 0.1);
            margin-bottom: 12px;
        }

        /* 이름만 심플하게 남김 */
        .char-info h3 {
            font-size: 1.1rem;
            color: #222;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 새 캐릭터 추가 버튼 */
        .add-new {
            justify-content: center;
            align-items: center;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.2);
            min-height: 290px;
        }

        .add-new h3 {
            color: #555;
        }

        .add-new:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">AI Studio</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="window.location.href='../index.html'">X</button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="sidebar">
                <ul class="tree-view">
                    <li class="active">👥 My Characters</li>
                    <li>💬 최근 대화</li>
                    <li>🌍 세계관 설정</li>
                    <li>⚙️ 시스템 설정</li>
                </ul>
            </div>

            <div class="main-content">
                <h2 class="main-title">My Characters</h2>
                <div class="card-grid">
                    
                    <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>S급 에스퍼</h3>
                        </div>
                    </div>

                    <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>매칭률 99% 가이드</h3>
                        </div>
                    </div>

                     <div class="character-card">
                        <div class="char-img-placeholder">IMG</div>
                        <div class="char-info">
                            <h3>소꿉친구 마법사</h3>
                        </div>
                    </div>

                    <div class="character-card add-new">
                        <div class="char-info">
                            <h3>+ 새 캐릭터</h3>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
