<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Character Select</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 삭제 버튼 전용 미세 튜닝 스타일 (style.css 안 건드려도 되게 여기에 임시 추가!) */
        .character-card {
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: all 0.2s ease;
        }
        .delete-btn:hover {
            background: #ff5f56;
            color: white;
            border-color: #ff5f56;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <button class="menu-btn" id="menuBtn" aria-label="Toggle Menu">☰</button>
                <div class="title-bar-text">AI Studio v2.0</div>
            </div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="window.location.href='../index.html'">X</button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <div class="sidebar" id="sidebar">
                <ul class="tree-view">
                    <li class="active">👥 My Characters</li>
                    <li>💬 Recent Chats</li>
                    <li>🌍 World Settings</li>
                    <li>⚙️ System Settings</li>
                </ul>
            </div>

            <div class="main-content">
                <h2 class="main-title">My Characters</h2>
                <div class="card-grid">
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
