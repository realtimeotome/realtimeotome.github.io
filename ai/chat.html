<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <button class="icon-btn" onclick="window.location.href='index.html'">◀</button>
                <div class="title-bar-text" id="chatTitle">Character</div>
            </div>
            <div class="title-bar-controls">
                <button class="icon-btn" id="chatSettingsBtn" title="Settings">⚙️</button>
                <button aria-label="Close" onclick="window.location.href='../index.html'">X</button>
            </div>
        </div>
        
        <div class="window-body chat-body">
            
            <div class="chat-main">
                <div class="chat-history" id="chatHistory">
                    
                    <!-- 더미 데이터: 영어 예시 2줄 -->
                    <div class="novel-block">
                        <p class="narrative">The cold wind blew through the empty server room, chilling everything it touched.</p>
                        <p class="dialogue ai-dialogue">"Are you the one they sent?"</p>
                    </div>
                    <!-- // 더미 데이터 끝 -->

                </div>

                <div class="chat-input-wrapper">
                    <div class="chat-toolbar">
                        <!-- 선택 불가한 단순 표기용 클래스로 변경 (기호 삭제) -->
                        <div class="model-display">✨ Gemini 1.5 Pro</div>
                        <div class="toolbar-btns">
                            <button>💾 Memory</button>
                            <button>🖼️ Image</button>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea id="chatInput" placeholder="Type your message here..."></textarea>
                        <button class="send-btn" id="sendBtn">➤</button>
                    </div>
                </div>
            </div>

            <div class="chat-settings-panel" id="chatSettingsPanel">
                <div class="panel-header">
                    <h3>Chat Settings</h3>
                    <button id="closeSettingsBtn">X</button>
                </div>
                <div class="panel-content">
                    <div class="setting-group">
                        <label>Selected Model</label>
                        <select class="glass-select">
                            <option>✨ Gemini 1.5 Pro</option>
                            <option>🧠 Claude 3.5 Sonnet</option>
                            <option>🔞 Llama-3-NSFW</option>
                        </select>
                    </div>
                    <ul class="setting-menu-list">
                        <li>📝 Edit Persona <span>></span></li>
                        <li>👤 User Notes <span>></span></li>
                        <li>📚 Lorebook <span>></span></li>
                        <hr>
                        <li>⚙️ Custom Room Settings <span>></span></li>
                    </ul>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
