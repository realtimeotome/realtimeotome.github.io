<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <button class="icon-btn" onclick="window.location.href='index.html?tab=recent'">◀</button>
                <div class="title-bar-text" id="chatTitle">Character</div>
            </div>
            <div class="title-bar-controls">
                <button class="icon-btn" id="chatSettingsBtn" title="Settings">⚙️</button>
            </div>
        </div>
        
        <div class="window-body chat-body">
            
            <div class="chat-main">
                <div class="chat-history" id="chatHistory">
                    <!-- 자바스크립트가 여기 대화를 그려줌 -->
                </div>

                <div class="chat-input-wrapper">
                    <div class="chat-toolbar">
                        <div class="model-display" id="modelDisplay">✨ Gemini 1.5 Pro</div>
                        <div class="toolbar-btns">
                            <button>💾 Memory</button>
                            <button>🖼️ Image</button>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea id="chatInput" placeholder="대사를 입력하세요. 묘사는 *별표*로 감싸주세요."></textarea>
                        <button class="send-btn" id="sendBtn">➤</button>
                    </div>
                </div>
            </div>

            <!-- 우측 설정 패널 -->
            <div class="chat-settings-panel" id="chatSettingsPanel">
                <div class="panel-header">
                    <h3>Chat Settings</h3>
                    <button id="closeSettingsBtn">X</button>
                </div>
                <div class="panel-content">
                    <div class="setting-group">
                        <label>Selected Model</label>
                        <select class="glass-select" id="modelSelect">
                            <option value="✨ Gemini 1.5 Pro">✨ Gemini 1.5 Pro</option>
                            <option value="🧠 Claude 3.5 Sonnet">🧠 Claude 3.5 Sonnet</option>
                            <option value="🔞 Llama-3-NSFW">🔞 Llama-3-NSFW</option>
                        </select>
                    </div>
                    
                    <hr class="panel-divider">

                    <ul class="setting-menu-list">
                        <li>📝 Edit Persona <span>></span></li>
                        <li>👤 User Notes <span>></span></li>
                        <li>📚 Lorebook <span>></span></li>
                        
                        <!-- 🎨 펼침형(아코디언) 테마 세팅 메뉴 -->
                        <li class="has-submenu">
                            <div class="menu-header" id="themeToggleBtn">
                                <span>🎨 Theme Settings</span>
                                <span class="arrow">></span>
                            </div>
                            <div class="submenu-content" id="themeSubmenu">
                                <div class="theme-controls">
                                    <label>Background Color</label>
                                    <input type="color" id="themeBg" class="color-picker" value="#ffffff">
                                    
                                    <label>Font Family</label>
                                    <select id="themeFont" class="glass-select">
                                        <option value="'Inter', sans-serif">Inter (Gothic)</option>
                                        <option value="'Noto Serif KR', serif">Noto Serif (Myeongjo)</option>
                                        <option value="monospace">Monospace</option>
                                    </select>
                                    
                                    <label>Font Size</label>
                                    <input type="range" id="themeSize" min="0.8" max="1.5" step="0.05" value="1.05">

                                    <label>User Text Color</label>
                                    <input type="color" id="themeUserColor" class="color-picker" value="#111111">

                                    <label>AI Text Color</label>
                                    <input type="color" id="themeAiColor" class="color-picker" value="#2c5282">

                                    <label>Narration Color (Italic)</label>
                                    <input type="color" id="themeNarrationColor" class="color-picker" value="#777777">
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
