<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Create Character</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <div class="title-bar-text">Create New Character</div>
            </div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="window.location.href='index.html'">X</button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="create-container">
                <h2 class="main-title">Character Configuration</h2>
                
                <form id="characterForm" onsubmit="return false;">
                    <div class="form-row-top">
                        <div class="img-upload-box">
                            <div class="img-preview" id="imgPreview">No Image</div>
                            <input type="text" id="charImage" placeholder="Image URL (Option)">
                        </div>
                        
                        <div class="info-input-box">
                            <div class="form-group">
                                <label for="charName">Character Name</label>
                                <input type="text" id="charName" placeholder="E.g., S-Class Esper" required>
                            </div>
                            <div class="form-group">
                                <label for="charIntro">Short Introduction</label>
                                <input type="text" id="charIntro" placeholder="E.g., A cold but caring combat esper.">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="charPrompt">System Prompt (Character Lore & Personality)</label>
                        <textarea id="charPrompt" placeholder="Write the detailed traits, rules, behaviors, and NSFW guidelines here... This will be sent directly to the AI core." required></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="button" class="btn btn-cancel" onclick="window.location.href='index.html'">Cancel</button>
                        <button type="submit" class="btn btn-save" id="saveBtn">Save Character</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
