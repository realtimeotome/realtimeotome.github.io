<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realtimeotom3 - START</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100dvh; 
            overflow: hidden;
            background-color: #ffffff; /* 깔끔한 화이트 배경 */
            font-family: monospace;
        }

        .pixel-font {
            font-family: 'NeoDunggeunmo', monospace;
            -webkit-font-smoothing: none; 
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* -------------------------------------------
           상단 & 하단 바 (원래 설정 100% 유지)
           ------------------------------------------- */
        .top-bar {
            height: 35px;
            background: #dfdfdf;
            border-bottom: 2px solid #808080; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            user-select: none;
            flex-shrink: 0;
        }
        
        .top-menu {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .top-menu::-webkit-scrollbar { display: none; }

        .menu-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            flex-shrink: 0;
        }

        .menu-btn:active, .menu-btn.active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 7px 1px 9px; 
            background: #d4d4d4; 
        }

        .menu-bar {
            height: 34px; 
            background: #dfdfdf;
            border-top: 2px solid #ffffff; 
            border-bottom: 3px solid #808080;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px; 
            flex-shrink: 0;
        }

        .address-label { font-size: 16px; color: #000; }

        .address-field {
            flex-grow: 1; 
            height: 22px;
            background: #fff;
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 0 8px;
            color: #000;
            font-size: 14px;
            outline: none; 
        }

        .address-dropdown-btn {
            width: 22px;
            height: 22px;
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; color: #000;
        }
        .address-dropdown-btn:active {
            border-top: 2px solid #555; border-left: 2px solid #555;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
            padding: 1px 0 0 1px; 
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            flex-shrink: 0;
        }
        
        .start-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-right: 2px solid #555; border-bottom: 2px solid #555;
            padding: 4px 20px; height: 30px; cursor: pointer;
        }
        .start-btn:active {
            border-top: 2px solid #555; border-left: 2px solid #555;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
        }
        #clock { font-size: 16px; user-select: none; }

        /* ==========================================
           👇 스케치 기반 메인 레이아웃 (선화 스타일)
           ========================================== */
        
        .main-layout {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            background-color: #ffffff;
            overflow: hidden; /* 전체 페이지 스크롤 방지 */
        }

        /* 1. 좌측 영역 (스크롤 가능) */
        .left-col {
            width: 320px;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 20px;
            overflow-y: scroll; /* 스케치 요구사항: "여기 조절 바" */
            flex-shrink: 0;
            background: #fff;
        }

        /* 좌측 내부 요소들 */
        .img-box {
            width: 100%;
            height: 250px;
            border: 2px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-style: italic;
        }

        .striped-bar {
            width: 100%;
            height: 35px;
            border: 2px solid #000;
            /* 사선 패턴 구현 */
            background: repeating-linear-gradient(
                -45deg,
                #fff,
                #fff 10px,
                #000 10px,
                #000 15px
            );
        }

        .checklist-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px 0;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .line-wave {
            flex-grow: 1;
            height: 2px;
            background: #000;
            margin-right: 15px;
            /* 스케치의 구불구불한 선 대신 깔끔한 직선 처리, 필요시 수정 가능 */
        }

        .check-square {
            width: 24px;
            height: 24px;
            border: 2px solid #000;
            flex-shrink: 0;
        }

        .rounded-btn {
            width: 100%;
            height: 45px;
            border: 2px solid #000;
            border-radius: 25px; /* 스케치의 타원형 버튼 */
        }

        /* 2. 우측 영역 */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        /* 우측 상단 박스 */
        .right-top-box {
            width: 100%;
            height: 150px;
            border: 2px solid #000;
            flex-shrink: 0;
        }

        /* 우측 하단 2분할 영역 */
        .right-bottom-split {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow: hidden;
        }

        /* backup & archive 공통 스타일 */
        .bottom-box {
            flex: 1;
            border: 2px solid #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .box-title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* backup 리스트 형태 */
        .backup-item {
            width: 100%;
            height: 40px;
            border: 2px solid #000;
        }

        .backup-wave {
            width: 80%;
            height: 2px;
            background: #000;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        /* archive 리스트 형태 */
        .archive-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .archive-circle {
            width: 60px;
            height: 60px;
            border: 2px solid #000;
            border-radius: 50%; /* 스케치의 동그라미 */
            flex-shrink: 0;
        }

        .archive-line {
            flex-grow: 1;
            height: 2px;
            background: #000;
        }

        /* 반응형 (화면 좁아질 때 세로로 떨어지게) */
        @media screen and (max-width: 900px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .left-col { width: 100%; overflow-y: visible; }
            .right-bottom-split { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        
        <!-- 공통 상단 헤더 -->
        <header class="top-bar">
            <div class="top-menu">
                <button class="menu-btn pixel-font" onclick="location.href='index.html'">main</button>
                <button class="menu-btn pixel-font">file</button>
                <button class="menu-btn pixel-font">favorites</button>
                <button class="menu-btn pixel-font">help!</button>
                <button class="menu-btn pixel-font">lucky?</button>
                <button class="menu-btn pixel-font" onclick="location.href='ai/'">chat♡</button>
            </div>
        </header>
        
        <div class="menu-bar">
            <div class="address-label pixel-font">Address</div>
            <input type="text" class="address-field pixel-font" placeholder="file:///C:/realtimeotome/start.html" readonly>
            <div class="address-dropdown-btn pixel-font">▼</div>
        </div>

        <!-- 👇 스케치와 동일하게 구현된 메인 레이아웃 -->
        <main class="main-layout">
            
            <!-- 1. 좌측 (조절바 포함) -->
            <div class="left-col">
                <div class="img-box pixel-font">img</div>
                <div class="striped-bar"></div>
                
                <div class="checklist-group">
                    <div class="checklist-item">
                        <div class="line-wave"></div>
                        <div class="check-square"></div>
                    </div>
                    <div class="checklist-item">
                        <div class="line-wave"></div>
                        <div class="check-square"></div>
                    </div>
                    <div class="checklist-item">
                        <div class="line-wave"></div>
                        <div class="check-square"></div>
                    </div>
                </div>

                <div class="rounded-btn"></div>
                <div class="rounded-btn"></div>
            </div>

            <!-- 2. 우측 -->
            <div class="right-col">
                
                <!-- 우측 상단 -->
                <div class="right-top-box"></div>
                
                <!-- 우측 하단 (Backup / Archive) -->
                <div class="right-bottom-split">
                    
                    <div class="bottom-box">
                        <div class="box-title pixel-font">- backup -</div>
                        <div class="backup-item"></div>
                        <div class="backup-wave"></div>
                        <div class="backup-item"></div>
                        <div class="backup-wave"></div>
                        <div class="backup-item"></div>
                        <div class="backup-wave"></div>
                    </div>

                    <div class="bottom-box">
                        <div class="box-title pixel-font">- archive -</div>
                        <div class="archive-item">
                            <div class="archive-circle"></div>
                            <div class="archive-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle"></div>
                            <div class="archive-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle"></div>
                            <div class="archive-line"></div>
                        </div>
                    </div>

                </div>
            </div>

        </main>

        <!-- 공통 하단 바 -->
        <footer class="bottom-bar">
            <div class="start-btn pixel-font" id="resetBtn" style="display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:16px;">reset</div>
            <div id="clock" class="pixel-font">00/00/0000 00:00 PM</div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let month = now.getMonth() + 1;
            let date = now.getDate();
            let year = now.getFullYear();

            month = month < 10 ? '0' + month : month;
            date = date < 10 ? '0' + date : date;
            const dateStr = month + '/' + date + '/' + year;

            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeStr = hours + ':' + minutes + ' ' + ampm;

            document.getElementById('clock').innerHTML = dateStr + ' ' + timeStr;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
