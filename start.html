<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realtimeotom3 - START</title>
    <!-- 폰트 불러오기 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    <!-- 분리한 CSS 파일 연결! -->
    <link rel="stylesheet" href="start.css">
</head>
<body>

    <div class="win-wrapper">
        
        <!-- 상단 바 -->
        <header class="top-bar">
            <div class="top-menu">
                <button class="menu-btn pixel-font" onclick="location.href='index.html'">main</button>
                <button class="menu-btn pixel-font">file</button>
                <button class="menu-btn pixel-font">favorites</button>
                <button class="menu-btn pixel-font">help!</button>
                <button class="menu-btn pixel-font">lucky?</button>
                <button class="menu-btn pixel-font" onclick="location.href='ai/'">chat♡</button>
            </div>
        </header>
        
        <div class="menu-bar">
            <div class="address-label pixel-font">Address</div>
            <input type="text" class="address-field pixel-font" placeholder="file:///C:/realtimeotome/start.html" readonly>
            <div class="address-dropdown-btn pixel-font">▼</div>
        </div>

        <main class="main-layout">
            
            <!-- 💻 좌측 컬럼: SYS.OP 프로필 패널 -->
            <div class="left-col panel-raised">
                <div class="img-box panel-sunken pixel-font">img</div>
                
                <!-- 1. 스탯창 구역 -->
                <div class="profile-section">
                    <div class="section-title pixel-font">SYS.OP_STATUS</div>
                    <div class="status-box panel-sunken pixel-font">
                        <div class="stat-line">NAME: <span class="editable">Anonymous</span></div>
                        <div class="stat-line">LV.<span class="editable">99</span> | HP <span class="editable">999</span> | MP <span class="editable">000</span></div>
                        <div class="stat-line">MOOD: <span class="editable">💤 (Sleep)</span></div>
                        <div class="stat-line">SYNC: <span class="editable">2026.07.15</span></div>
                    </div>
                </div>

                <div class="etched-line"></div>

                <!-- 2. 미디어 플레이어 구역 -->
                <div class="profile-section">
                    <div class="section-title pixel-font">MEDIA_MODULE</div>
                    <div class="media-box panel-sunken pixel-font">
                        <div class="stat-line">▶ <span class="editable">少女の幻想.mid</span></div>
                        <div class="stat-line">VOL: ■■■■■■■□□□</div>
                    </div>
                    <div class="media-controls">
                        <button class="control-btn panel-raised pixel-font" id="btn-prev">⏪</button>
                        <button class="control-btn panel-raised pixel-font" id="btn-stop">⏹</button>
                        <button class="control-btn panel-raised pixel-font" id="btn-play">▶</button>
                    </div>
                    <!-- 실제 노래가 나오는 숨겨진 태그 (src 경로에 실제 음악 파일 이름 넣기!) -->
                    <audio id="bgm-player" src="music.mp3" loop></audio>
                </div>

                <div class="etched-line"></div>

                <!-- 3. 시스템 커맨드 구역 -->
                <div class="profile-section command-group">
                    <button class="action-btn panel-raised pixel-font">💌 GUESTBOOK</button>
                    <button class="action-btn panel-raised pixel-font">📧 SEND MAIL</button>
                    <button class="action-btn panel-raised pixel-font" style="color: #cc0000;">🔌 SHUT DOWN</button>
                </div>
            </div>

            <!-- 📁 우측 컬럼: 아카이브 영역 -->
            <div class="right-col">
                <div class="right-top-box panel-raised"></div>
                
                <div class="right-bottom-split">
                    <fieldset class="retro-groupbox panel-raised">
                        <legend class="pixel-font box-title">- backup -</legend>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                    </fieldset>

                    <fieldset class="retro-groupbox panel-raised">
                        <legend class="pixel-font box-title">- archive -</legend>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                    </fieldset>
                </div>
            </div>

        </main>

        <footer class="bottom-bar">
            <div class="start-btn pixel-font" id="resetBtn" style="display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:16px;">reset</div>
            <div id="clock" class="pixel-font">00/00/0000 00:00 PM</div>
        </footer>
    </div>

    <!-- 분리한 JS 파일 연결! (맨 아래에 두는 게 좋음) -->
    <script src="start.js"></script>
</body>
</html>
