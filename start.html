<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realtimeotom3 - START</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100dvh; 
            overflow: hidden;
            background-color: #ffffff; 
            font-family: monospace;
        }

        .pixel-font {
            font-family: 'NeoDunggeunmo', monospace;
            -webkit-font-smoothing: none; 
        }

        .win-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* -------------------------------------------
           상단 & 하단 바 (오리지널 코드 100% 유지)
           ------------------------------------------- */
        .top-bar {
            height: 35px;
            background: #dfdfdf;
            border-bottom: 2px solid #808080; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            user-select: none;
            flex-shrink: 0;
        }
        
        .top-menu {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .top-menu::-webkit-scrollbar { display: none; }

        .menu-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            flex-shrink: 0;
        }

        .menu-btn:active, .menu-btn.active {
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 3px 7px 1px 9px; 
            background: #d4d4d4; 
        }

        .menu-bar {
            height: 34px; 
            background: #dfdfdf;
            border-top: 2px solid #ffffff; 
            border-bottom: 3px solid #808080;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px; 
            flex-shrink: 0;
        }

        .address-label { font-size: 16px; color: #000; }

        .address-field {
            flex-grow: 1; 
            height: 22px;
            background: #fff;
            border-top: 2px solid #555;
            border-left: 2px solid #555;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 0 8px;
            color: #000;
            font-size: 14px;
            outline: none; 
        }

        .address-dropdown-btn {
            width: 22px;
            height: 22px;
            background: #dfdfdf;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #555;
            border-bottom: 2px solid #555;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; color: #000;
        }
        .address-dropdown-btn:active {
            border-top: 2px solid #555; border-left: 2px solid #555;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
            padding: 1px 0 0 1px; 
        }

        .bottom-bar {
            height: 45px;
            background: #dfdfdf;
            border-top: 3px solid #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            flex-shrink: 0;
        }
        
        .start-btn {
            background: #dfdfdf;
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-right: 2px solid #555; border-bottom: 2px solid #555;
            padding: 4px 20px; height: 30px; cursor: pointer;
        }
        .start-btn:active {
            border-top: 2px solid #555; border-left: 2px solid #555;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
        }
        #clock { font-size: 16px; user-select: none; }

        /* ==========================================
           👇 메인 레이아웃 (클래식 양각/음각 UI 적용)
           ========================================== */
        
        /* 공통 3D 효과 클래스 */
        .panel-raised {
            background: #dfdfdf; /* 레트로 윈도우 기본 옅은 회색 */
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-right: 2px solid #808080; border-bottom: 2px solid #808080;
        }
        
        .panel-sunken {
            background: #fff;
            border-top: 2px solid #808080; border-left: 2px solid #808080;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
        }

        .etched-line {
            height: 2px;
            background: #808080;
            border-bottom: 1px solid #fff;
            margin: 5px 0;
        }

        .main-layout {
            flex: 1;
            display: flex;
            padding: 15px;
            gap: 15px;
            background-color: #dfdfdf; /* 레퍼런스 감성의 기본 바탕색 */
            overflow: hidden;
        }

        /* 1. 좌측 영역 (스크롤바 포함, 살짝 파인 패널 느낌) */
        .left-col {
            width: 300px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 20px;
            overflow-y: scroll;
            flex-shrink: 0;
            background: #dfdfdf;
            border-top: 2px solid #808080; border-left: 2px solid #808080;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
        }

        /* IMG 박스 (깊게 파인 하얀 상자) */
        .img-box {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-style: italic;
            color: #555;
            flex-shrink: 0;
        }

        /* 체크리스트 영역 */
        .checklist-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px 0;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .check-line {
            flex-grow: 1;
            margin-right: 15px;
        }

        /* 체크박스 (음각) */
        .check-square {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* 둥근 버튼 (양각) */
        .rounded-btn {
            width: 100%;
            height: 38px;
            border-radius: 19px; 
            background: #dfdfdf;
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-right: 2px solid #808080; border-bottom: 2px solid #808080;
            cursor: pointer;
        }
        .rounded-btn:active {
            border-top: 2px solid #808080; border-left: 2px solid #808080;
            border-right: 2px solid #fff; border-bottom: 2px solid #fff;
        }

        /* 2. 우측 영역 */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 우측 상단 박스 (파인 느낌) */
        .right-top-box {
            width: 100%;
            height: 140px;
            flex-shrink: 0;
        }

        /* 우측 하단 2분할 영역 */
        .right-bottom-split {
            /* flex: 1을 빼고 고정 높이를 주어 하단에 여백 생성! */
            height: 320px; 
            display: flex;
            gap: 15px;
        }

        /* backup & archive 테두리 (Fieldset 적용) */
        fieldset.retro-groupbox {
            flex: 1;
            /* 윈도우 특유의 그룹박스 테두리 */
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 15px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        /* 선 중간을 파먹고 들어가는 텍스트 */
        legend.box-title {
            padding: 0 8px;
            font-size: 18px;
            color: #000;
            margin-left: 10px;
        }

        /* backup 리스트 아이템 (음각 박스) */
        .backup-item {
            width: 100%;
            height: 30px;
            flex-shrink: 0;
        }

        /* archive 리스트 아이템 */
        .archive-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* 동그라미 (음각) */
        .archive-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%; 
            flex-shrink: 0;
        }

        .archive-line {
            flex-grow: 1;
        }

        /* 반응형 */
        @media screen and (max-width: 900px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .left-col { width: 100%; overflow-y: visible; }
            .right-bottom-split { flex-direction: column; height: auto; }
        }
    </style>
</head>
<body>

    <div class="win-wrapper">
        
        <!-- 공통 상단 헤더 -->
        <header class="top-bar">
            <div class="top-menu">
                <button class="menu-btn pixel-font" onclick="location.href='index.html'">main</button>
                <button class="menu-btn pixel-font">file</button>
                <button class="menu-btn pixel-font">favorites</button>
                <button class="menu-btn pixel-font">help!</button>
                <button class="menu-btn pixel-font">lucky?</button>
                <button class="menu-btn pixel-font" onclick="location.href='ai/'">chat♡</button>
            </div>
        </header>
        
        <div class="menu-bar">
            <div class="address-label pixel-font">Address</div>
            <input type="text" class="address-field pixel-font" placeholder="file:///C:/realtimeotome/start.html" readonly>
            <div class="address-dropdown-btn pixel-font">▼</div>
        </div>

        <!-- 👇 3D 엠보싱이 들어간 메인 뼈대 레이아웃 -->
        <main class="main-layout">
            
            <!-- 1. 좌측 (조절바 포함 음각 패널) -->
            <div class="left-col">
                <div class="img-box panel-sunken pixel-font">img</div>
                
                <!-- 사선 스트라이프 제거됨 -->
                
                <div class="checklist-group">
                    <div class="checklist-item">
                        <div class="check-line etched-line"></div>
                        <div class="check-square panel-sunken"></div>
                    </div>
                    <div class="checklist-item">
                        <div class="check-line etched-line"></div>
                        <div class="check-square panel-sunken"></div>
                    </div>
                    <div class="checklist-item">
                        <div class="check-line etched-line"></div>
                        <div class="check-square panel-sunken"></div>
                    </div>
                </div>

                <div class="rounded-btn"></div>
                <div class="rounded-btn"></div>
            </div>

            <!-- 2. 우측 -->
            <div class="right-col">
                
                <!-- 우측 상단 (음각 박스) -->
                <div class="right-top-box panel-sunken"></div>
                
                <!-- 우측 하단 (높이를 고정하여 하단에 여백을 남김) -->
                <div class="right-bottom-split">
                    
                    <!-- HTML Fieldset을 사용하여 선 중간에 글씨 배치 -->
                    <fieldset class="retro-groupbox">
                        <legend class="pixel-font box-title">- backup -</legend>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                        <div class="backup-item panel-sunken"></div>
                        <div class="etched-line" style="width: 80%; margin-left: 10%;"></div>
                    </fieldset>

                    <fieldset class="retro-groupbox">
                        <legend class="pixel-font box-title">- archive -</legend>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                        <div class="archive-item">
                            <div class="archive-circle panel-sunken"></div>
                            <div class="archive-line etched-line"></div>
                        </div>
                    </fieldset>

                </div>
            </div>

        </main>

        <!-- 공통 하단 바 -->
        <footer class="bottom-bar">
            <div class="start-btn pixel-font" id="resetBtn" style="display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:16px;">reset</div>
            <div id="clock" class="pixel-font">00/00/0000 00:00 PM</div>
        </footer>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let month = now.getMonth() + 1;
            let date = now.getDate();
            let year = now.getFullYear();

            month = month < 10 ? '0' + month : month;
            date = date < 10 ? '0' + date : date;
            const dateStr = month + '/' + date + '/' + year;

            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeStr = hours + ':' + minutes + ' ' + ampm;

            document.getElementById('clock').innerHTML = dateStr + ' ' + timeStr;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
